<!doctype html><html lang="en">  <head>    <meta charset="UTF-8" />    <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <title>Pingly — Simple. Private. Yours.</title>    <meta      name="description"      content="Pingly is a private messaging app. Chat and call people by username — no phone number required."    />    <meta name="keywords" content="Pingly, private messaging, chat app, voice call, video call, username chat" />    <meta name="robots" content="index, follow" />    <meta name="author" content="Pingly" />    <meta property="og:title" content="Pingly — Simple. Private. Yours." />    <meta      property="og:description"      content="Chat and call people by username — no phone number required."    />    <meta property="og:type" content="website" />    <meta property="og:site_name" content="Pingly" />    <meta property="og:image" content="/favicon.svg" />    <meta name="twitter:card" content="summary" />    <meta name="twitter:title" content="Pingly — Simple. Private. Yours." />    <meta      name="twitter:description"      content="Chat and call people by username — no phone number required."    />    <meta name="twitter:image" content="/favicon.svg" />    <link rel="icon" href="/favicon.svg" />    <link rel="apple-touch-icon" href="/favicon.svg" />    <meta name="theme-color" content="#E1306C" />    <meta name="apple-mobile-web-app-capable" content="yes" />    <meta name="apple-mobile-web-app-title" content="Pingly" />    <style>      #initial-loader {        height: 100vh;        height: 100dvh;        display: flex;        flex-direction: column;        align-items: center;        justify-content: center;        gap: 20px;        background: #fff7f5;        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;      }      @media (prefers-color-scheme: dark) {        #initial-loader { background: #1a0f14; }      }      #initial-loader .logo {        font-size: 40px;        font-weight: 700;        background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);        background-size: 300% 300%;        -webkit-background-clip: text;        background-clip: text;        color: transparent;        animation: shimmer 2s ease-in-out infinite, pulse 1.6s ease-in-out infinite;      }      #initial-loader .dots {        display: flex;        gap: 8px;      }      #initial-loader .dots span {        width: 10px;        height: 10px;        border-radius: 50%;        background: linear-gradient(45deg, #f09433, #bc1888);        animation: bounce 1.2s infinite ease-in-out;      }      #initial-loader .dots span:nth-child(2) { animation-delay: 0.15s; }      #initial-loader .dots span:nth-child(3) { animation-delay: 0.3s; }      @keyframes shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.85; } }      @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.6; } 30% { transform: translateY(-4px); opacity: 1; } }    </style>  </head>  <body>    <div id="root">      <div id="initial-loader">        <div class="logo">Pingly</div>        <div class="dots"><span></span><span></span><span></span></div>      </div>    </div>    <script type="module" src="/src/main.jsx"></script>  </body></html>
